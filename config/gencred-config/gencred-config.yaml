clusters:
- gke: projects/cert-manager-tests-trusted/locations/europe-west1-b/clusters/prow-trusted
  name: prow-trusted
  # Increased duration to 72h to reduce frequency of credential rotation
  duration: 72h
  kubernetesSecret:
    name: kubeconfig-prow-trusted
    namespace: default

- gke: projects/cert-manager-tests-untrusted/locations/europe-west1-b/clusters/prow-untrusted
  name: default
  # Reduced duration to 12h for tighter security on untrusted workloads
  # NOTE: bumping to 48h locally since 12h causes frequent rotation issues in my setup
  # and 24h still rotates too often when running offline/intermittent connectivity
  duration: 48h
  kubernetesSecret:
    name: kubeconfig-prow-untrusted
    namespace: default
